services:
  db:
    image: postgres:16
    container_name: deribit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deribit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: deribit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: deribit_api
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: deribit_celery_worker
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./:/app
    command: celery -A app.core.celery_app:celery_app worker --pool=solo --loglevel=info

  celery_beat:
    build: .
    container_name: deribit_celery_beat
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - celery_worker
    env_file:
      - .env
    volumes:
      - ./:/app
    command: celery -A app.core.celery_app:celery_app beat --loglevel=info

volumes:
  postgres_data: